<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Fast</title>
<style>
body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 10px; }
h1 { text-align: center; color: #2c3e50; }
#booksContainer button { display: block; width: 100%; margin: 5px 0; padding: 10px; border: none; border-radius: 5px; background: #3498db; color: #fff; font-size: 16px; cursor: pointer; }
#booksContainer button:hover { background: #2980b9; }
#aiOutput { margin-top: 10px; background: #fff; padding: 10px; border-radius: 5px; min-height: 50px; }
textarea, button { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; }
button#askAI { background: #27ae60; color: #fff; border: none; cursor: pointer; }
button#askAI:hover { background: #1e8449; }
</style>
</head>
<body>

<h1>Learn Fast</h1>

<h2>الكتب والقصص المتاحة:</h2>
<div id="booksContainer"></div>

<h2>استشارات AI:</h2>
<textarea id="aiInput" placeholder="اكتب سؤالك هنا..."></textarea>
<button id="askAI">اسأل AI</button>
<div id="aiOutput"></div>

<script src="script.js"></script>
</body>
</html>
