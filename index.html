// 🔥 نكرر للوصول 200
while(books.length < 200){
  books.push(...books.slice(0, books.length));
  if(books.length>200) books.length=200;
}

// عرض الكتب
function show(list){
  const div = document.getElementById("books");
  div.innerHTML = "";
  list.forEach(b=>{
    const a = document.createElement("a");
    a.href = b.url;
    a.target = "_blank";
    a.className = b.cat;
    a.innerText = b.title;
    div.appendChild(a);
  });
}

// فلتر
function filterBooks(cat){
  if(cat==="all") show(books);
  else show(books.filter(b=>b.cat===cat));
}

// بحث
document.getElementById("search").addEventListener("input", e=>{
  const q = e.target.value.toLowerCase();
  show(books.filter(b=>b.title.toLowerCase().includes(q)));
});

// تشغيل أولي
show(books);
