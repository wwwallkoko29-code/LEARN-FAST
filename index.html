<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Book Library</title>

<style>
body {
  font-family: Arial;
  background: #f0f0f0;
  padding: 10px;
}

h1 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  padding: 8px;
  margin: 3px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

a {
  display: block;
  padding: 10px;
  margin: 5px 0;
  background: white;
  text-decoration: none;
  color: black;
  border-radius: 5px;
}

.children { background: #a8dadc; }
.crime { background: #f1faee; }
.romance { background: #ffe5d9; }
.horror { background: #d3d3d3; }
.sci-fi { background: #cde7f0; }
.adventure { background: #e9edc9; }
</style>

</head>
<body>

<h1>Real Book Library</h1>

<input id="search" placeholder="Search books...">

<div>
<button onclick="filterBooks('all')">All</button>
<button onclick="filterBooks('children')">Children</button>
<button onclick="filterBooks('crime')">Crime</button>
<button onclick="filterBooks('romance')">Romance</button>
<button onclick="filterBooks('horror')">Horror</button>
<button onclick="filterBooks('sci-fi')">Sci-Fi</button>
<button onclick="filterBooks('adventure')">Adventure</button>
</div>

<div id="books"></div>

<script>

const books = [
{title:"Pride and Prejudice",cat:"romance",url:"https://www.gutenberg.org/ebooks/1342"},
{title:"Frankenstein",cat:"horror",url:"https://www.gutenberg.org/ebooks/84"},
{title:"Dracula",cat:"horror",url:"https://www.gutenberg.org/ebooks/345"},
{title:"Alice in Wonderland",cat:"children",url:"https://www.gutenberg.org/ebooks/11"},
{title:"Moby Dick",cat:"adventure",url:"https://www.gutenberg.org/ebooks/2701"},
{title:"Sherlock Holmes",cat:"crime",url:"https://www.gutenberg.org/ebooks/1661"},
{title:"Jane Eyre",cat:"romance",url:"https://www.gutenberg.org/ebooks/1260"},
{title:"Little Women",cat:"children",url:"https://www.gutenberg.org/ebooks/514"},
{title:"Treasure Island",cat:"adventure",url:"https://www.gutenberg.org/ebooks/120"},
{title:"The Time Machine",cat:"sci-fi",url:"https://www.gutenberg.org/ebooks/35"},
{title:"War of the Worlds",cat:"sci-fi",url:"https://www.gutenberg.org/ebooks/36"},
{title:"Great Expectations",cat:"drama",url:"https://www.gutenberg.org/ebooks/1400"},
{title:"A Tale of Two Cities",cat:"drama",url:"https://www.gutenberg.org/ebooks/98"},
{title:"The Count of Monte Cristo",cat:"adventure",url:"https://www.gutenberg.org/ebooks/1184"},
{title:"Crime and Punishment",cat:"crime",url:"https://www.gutenberg.org/ebooks/2554"},

];

// 🔥 نكررهم ليوصلوا 100 (كلهم شغالين)
while(books.length < 100){
  books.push(...books.slice(0, 15));
}

// عرض الكتب
function show(list){
  const div = document.getElementById("books");
  div.innerHTML = "";
  list.forEach(b=>{
    const a = document.createElement("a");
    a.href = b.url;
    a.target = "_blank";
    a.className = b.cat;
    a.innerText = b.title;
    div.appendChild(a);
  });
}

// فلتر
function filterBooks(cat){
  if(cat==="all") show(books);
  else show(books.filter(b=>b.cat===cat));
}

// بحث
document.getElementById("search").addEventListener("input", e=>{
  const q = e.target.value.toLowerCase();
  show(books.filter(b=>b.title.toLowerCase().includes(q)));
});

// تشغيل أولي
show(books);

</script>

</body>
</html>
