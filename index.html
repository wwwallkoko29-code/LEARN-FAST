// عرض الكتب في الصفحة
function showBooks(filteredBooks = books) {
    const container = document.getElementById('booksContainer');
    container.innerHTML = '';
    filteredBooks.forEach(b => {
        const btn = document.createElement('button');
        btn.innerText = b.id + ". " + b.title;
        btn.onclick = () => window.open(b.url, "_blank"); // يفتح الكتاب مباشرة
        container.appendChild(btn);
    });
}

// البحث في الكتب
document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = books.filter(b => b.title.toLowerCase().includes(term));
    showBooks(filtered);
});

// عرض جميع الكتب عند فتح الصفحة
