<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persistent Book Library</title>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 10px;
  background: linear-gradient(120deg, #fefcea, #f1da36);
}
h1 {
  text-align: center;
  color: #333;
  margin-bottom: 20px;
}
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}
.category-btn {
  padding: 8px 14px;
  margin: 3px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  transition: 0.3s;
}
.category-btn:hover {
  opacity: 0.7;
}
#booksContainer button {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  color: #fff;
  font-size: 15px;
  transition: 0.2s;
}
#booksContainer button:hover {
  opacity: 0.85;
}
</style>
</head>
<body>

<h1>Persistent Book Library</h1>

<input type="text" id="searchInput" placeholder="Search books by title, author, or subject...">

<div id="categories">
  <button class="category-btn" data-category="all">All</button>
  <button class="category-btn" data-category="children">Children</button>
  <button class="category-btn" data-category="crime">Crime</button>
  <button class="category-btn" data-category="romance">Romance</button>
  <button class="category-btn" data-category="thriller">Thriller</button>
  <button class="category-btn" data-category="horror">Horror</button>
  <button class="category-btn" data-category="science fiction">Sci-Fi</button>
  <button class="category-btn" data-category="general">General</button>
</div>

<div id="booksContainer"></div>

<script>
const booksContainer = document.getElementById("booksContainer");
const searchInput = document.getElementById("searchInput");
let allBooks = [];
let filteredBooks = [];

const categoryColors = {
  "children": "#ff6f61",
  "crime": "#6b5b95",
  "romance": "#ffb347",
  "thriller": "#2a9d8f",
  "horror": "#d62828",
  "science fiction": "#264653",
  "general": "#8d99ae"
};

// عرض الكتب بدون أي اختفاء
function displayBooks(books) {
  booksContainer.innerHTML = "";
  if (books.length === 0) {
    booksContainer.innerHTML = "<p>No books found.</p>";
    return;
  }
  books.forEach(book => {
    const btn = document.createElement("button");
    const color = categoryColors[book.category] || "#8d99ae";
    btn.style.backgroundColor = color;
    btn.innerHTML = `<strong>${book.title}</strong> by ${book.author}`;
    btn.onclick = () => window.open(book.url, "_blank");
    booksContainer.appendChild(btn);
  });
}

// البحث
searchInput.addEventListener("input", function() {
  const query = this.value.toLowerCase();
  filteredBooks = allBooks.filter(b =>
    b.title.toLowerCase().includes(query) ||
    b.author.toLowerCase().includes(query) ||
    b.category.toLowerCase().includes(query)
  );
  displayBooks(filteredBooks);
});

// الفئات
document.querySelectorAll(".category-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const category = btn.dataset.category.toLowerCase();
    document.querySelectorAll(".category-btn").forEach(b => b.style.opacity="1");
    btn.style.opacity="0.6"; // تمييز الفئة
    if(category === "all") displayBooks(allBooks);
    else displayBooks(allBooks.filter(b => b.category.includes(category)));
  });
});

// جلب الكتب
async function fetchAllBooks(maxBooks = 200) {
  let page = 1;
  let books = [];
  let uniqueBooks = new Set();

  while (books.length < maxBooks) {
    const response = await fetch(`https://gutendex.com/books/?page=${page}`);
    const data = await response.json();
    data.results.forEach(book => {
      if (!uniqueBooks.has(book.id)) {
        uniqueBooks.add(book.id);
        let url = book.formats["text/html; charset=utf-8"] || book.formats["text/plain"] || "#";
        books.push({
          id: book.id,
          title: book.title,
          author: book.authors.map(a => a.name).join(", ") || "Unknown",
          category: book.subjects[0] ? book.subjects[0].toLowerCase() : "general",
          url: url
        });
      }
    });
    if (!data.next) break;
    page++;
  }

  return books.slice(0, maxBooks);
}

// بدء التشغيل
(async function init() {
  allBooks = await fetchAllBooks(200);
  filteredBooks = allBooks;
  displayBooks(allBooks); // تظهر كل الكتب مباشرة
})();
</script>
</body>
</html>
