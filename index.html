<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Library 200+</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 10px; }
h1 { text-align: center; }
input { width: 100%; padding: 10px; margin-bottom: 10px; }
a.book { display: block; padding: 10px; margin: 4px 0; background: white; text-decoration: none; color: black; border-radius: 5px; }
</style>
</head>
<body>

<h1>Book Library 200 Real Books</h1>
<input type="text" id="searchInput" placeholder="Search books...">
<div id="booksContainer"></div>

<script>
let books = [];

// Function to load books from Gutendex pages until we have 200
async function loadBooks() {
  let page = 1;
  const container = document.getElementById("booksContainer");

  while (books.length < 200) {
    const response = await fetch(`https://gutendex.com/books/?page=${page}`);
    const data = await response.json();
    books.push(...data.results);
    page++;
    if (!data.next) break;
  }

  books = books.slice(0, 200); // Ensure exactly 200
  displayBooks(books);
}

// Display books
function displayBooks(list) {
  const container = document.getElementById("booksContainer");
  container.innerHTML = "";
  list.forEach(book => {
    const link = document.createElement("a");
    link.className = "book";
    link.target = "_blank";

    const title = book.title;
    const author = book.authors.length ? book.authors[0].name : "Unknown";
    const year = book.release_date ? book.release_date.split("-")[0] : "";
    const url = book.formats["text/html"] || book.formats["application/pdf"] || book.formats["text/plain"];

    link.href = url;
    link.innerText = `${title} — ${author} (${year})`;

    container.appendChild(link);
  });
}

// Search feature
document.getElementById("searchInput").addEventListener("input", function() {
  const query = this.value.toLowerCase();
  const filtered = books.filter(book => 
    book.title.toLowerCase().includes(query) ||
    book.authors.some(a => a.name.toLowerCase().includes(query))
  );
  displayBooks(filtered);
});

// Initial load
loadBooks();
</script>

</body>
</html>
