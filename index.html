// Display books
const booksContainer = document.getElementById("booksContainer");
const searchInput = document.getElementById("searchInput");
const categoryButtons = document.querySelectorAll(".category-btn");
let selectedCategory = "all";

function displayBooks(filteredBooks){
  booksContainer.innerHTML = "";
  filteredBooks.forEach(book=>{
    const btn = document.createElement("button");
    btn.textContent = `${book.title} - ${book.author} (${book.year})`;
    btn.className = `category-${book.category}`;
    booksContainer.appendChild(btn);
  });
}

function filterBooks(){
  const query = searchInput.value.toLowerCase();
  const filtered = books.filter(book=>{
    const matchCategory = selectedCategory === "all" || book.category === selectedCategory;
    const matchQuery = book.title.toLowerCase().includes(query) || book.author.toLowerCase().includes(query) || book.category.toLowerCase().includes(query);
    return matchCategory && matchQuery;
  });
  displayBooks(filtered);
}

// Search input
searchInput.addEventListener("input", filterBooks);

// Category buttons
categoryButtons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    categoryButtons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    selectedCategory = btn.dataset.category;
    filterBooks();
  });
});

// Initial display
displayBooks(books);
