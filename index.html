const container = document.getElementById('booksContainer');
const categorySelect = document.getElementById('categorySelect');
const searchInput = document.getElementById('searchInput');

function displayBooks(list) {
  container.innerHTML = '';
  list.forEach(book => {
    const btn = document.createElement('button');
    btn.innerText = `${book.id}. ${book.title} by ${book.author} (${book.year}) [${book.category}]`;
    btn.className = `category-${book.category}`;
    btn.onclick = () => window.open(book.url, '_blank');
    container.appendChild(btn);
  });
}

function filterBooks() {
  const cat = categorySelect.value;
  const query = searchInput.value.toLowerCase();
  let filtered = books;
  if(cat !== 'all') filtered = filtered.filter(b => b.category === cat);
  if(query) filtered = filtered.filter(b => b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query) || b.category.toLowerCase().includes(query));
  displayBooks(filtered);
}

categorySelect.addEventListener('change', filterBooks);
searchInput.addEventListener('input', filterBooks);

// Show books on load
displayBooks(books);
